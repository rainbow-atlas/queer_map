name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Refresh map data from Supabase daily. Full build + deploy is required: GitHub Pages
  # serves dist/, and locations.json is only updated there after vite build copies public/.
  schedule:
    # ~midnight Austria: 23:00 UTC = 00:00 CET. In CEST (daylight time) this runs 01:00 local;
    # GitHub cron is UTC-only so there is no single expression that always hits local midnight.
    - cron: '0 23 * * *'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh static JSON data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Optional: override table used by fetch-locations.mjs for legal/impressum content.
          SUPABASE_LEGAL_TABLE: ${{ vars.SUPABASE_LEGAL_TABLE }}
        run: npm run build:data

      # Omit VITE_BASE_PATH so Vite uses base /queer_map/ (GitHub Pages project URL).
      # For a root custom domain build, set VITE_BASE_PATH=/ on the build step.
      - name: Build app
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: npm run build:app -- --mode production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 